<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Master - Voice Test</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }

        h1 {
            color: #00d9ff;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #connect {
            background: #00d9ff;
            color: #1a1a2e;
        }

        #disconnect {
            background: #ff4757;
            color: white;
        }

        #mute {
            background: #ffa502;
            color: #1a1a2e;
        }

        .status {
            padding: 10px 16px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
        }

        .status.connected {
            background: #2ed57320;
            color: #2ed573;
            border: 1px solid #2ed573;
        }

        .status.disconnected {
            background: #ff475720;
            color: #ff4757;
            border: 1px solid #ff4757;
        }

        .status.connecting {
            background: #ffa50220;
            color: #ffa502;
            border: 1px solid #ffa502;
        }

        #transcript {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .msg {
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .msg.user {
            background: #0a3d62;
            text-align: right;
        }

        .msg.assistant {
            background: #2d3436;
        }

        .msg .role {
            font-size: 11px;
            color: #888;
            margin-bottom: 2px;
        }

        #log {
            background: #0d0d1a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            color: #888;
        }
    </style>
</head>

<body>
    <h1>🩺 Clinical Master - Voice Test</h1>

    <div class="controls">
        <button id="connect" onclick="connectSession()">🎤 Connect</button>
        <button id="disconnect" onclick="disconnectSession()" disabled>⏹ End Consultation</button>
        <button id="mute" onclick="toggleMute()" disabled>🔇 Mute</button>
    </div>

    <div id="statusBar" class="status disconnected">Disconnected</div>

    <div id="transcript"></div>
    <div id="log"></div>

    <script>
        const BACKEND = 'ws://localhost:8000';
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let workletNode = null;
        let isMuted = false;
        let playbackQueue = [];
        let isPlaying = false;

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            el.scrollTop = el.scrollHeight;
        }

        function setStatus(status, text) {
            const el = document.getElementById('statusBar');
            el.className = 'status ' + status;
            el.textContent = text;
        }

        function addTranscript(role, content) {
            const el = document.getElementById('transcript');
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.innerHTML = `<div class="role">${role === 'user' ? '🧑‍⚕️ Doctor' : '🤒 Patient'}</div>${content}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        async function connectSession() {
            try {
                setStatus('connecting', 'Requesting microphone...');

                // Get microphone
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 24000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });

                audioContext = new AudioContext({ sampleRate: 24000 });
                await audioContext.resume();
                log('AudioContext state: ' + audioContext.state);

                const source = audioContext.createMediaStreamSource(mediaStream);

                // Use ScriptProcessorNode (works on file:// and all origins)
                const bufferSize = 4096;
                workletNode = audioContext.createScriptProcessor(bufferSize, 1, 1);

                // Connect WebSocket
                const sessionId = 'test-' + Date.now();
                setStatus('connecting', `Connecting to ${BACKEND}/ws/${sessionId}...`);
                log(`Connecting: ${BACKEND}/ws/${sessionId}`);

                ws = new WebSocket(`${BACKEND}/ws/${sessionId}`);

                ws.onopen = () => {
                    log('WebSocket connected — waiting for session_started...');
                    // Wire up mic audio via ScriptProcessorNode
                    workletNode.onaudioprocess = (e) => {
                        if (ws.readyState === WebSocket.OPEN && !isMuted) {
                            const f32 = e.inputBuffer.getChannelData(0);
                            const i16 = new Int16Array(f32.length);
                            for (let i = 0; i < f32.length; i++) {
                                const s = Math.max(-1, Math.min(1, f32[i]));
                                i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            ws.send(i16.buffer);
                        }
                    };
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleMessage(data);
                    } catch (e) {
                        log('Non-JSON message received');
                    }
                };

                ws.onerror = (e) => {
                    log('WebSocket error');
                    setStatus('disconnected', 'Connection error');
                };

                ws.onclose = (e) => {
                    log(`WebSocket closed (code: ${e.code})`);
                    setStatus('disconnected', 'Disconnected');
                    document.getElementById('connect').disabled = false;
                    document.getElementById('disconnect').disabled = true;
                    document.getElementById('mute').disabled = true;
                    cleanup();
                };

                document.getElementById('connect').disabled = true;
                document.getElementById('disconnect').disabled = false;
                document.getElementById('mute').disabled = false;

            } catch (err) {
                log('Error: ' + err.message);
                setStatus('disconnected', 'Failed: ' + err.message);
            }
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'session_started':
                    setStatus('connected', `Connected — ${data.duration_seconds}s consultation`);
                    log(`Session started (${data.duration_seconds}s)`);
                    break;

                case 'audio':
                    log('Audio chunk received: ' + (data.audio ? data.audio.length : 0) + ' chars');
                    playAudio(data.audio);
                    break;

                case 'audio_interrupted':
                    playbackQueue = [];
                    isPlaying = false;
                    log('Audio interrupted');
                    break;

                case 'history_added':
                case 'transcript_update':
                    if (data.item) {
                        addTranscript(data.item.role, data.item.content);
                        log(`[${data.item.role}] ${data.item.content.slice(0, 60)}...`);
                    }
                    break;

                case 'transcript_delta':
                    // Streaming — skip for simplicity in test client
                    break;

                case 'consultation_ended':
                    log('Consultation ended — generating feedback...');
                    setStatus('connecting', 'Generating feedback...');
                    break;

                case 'feedback_ready':
                    log('Feedback received!');
                    setStatus('connected', 'Feedback ready ✅');
                    if (data.feedback) {
                        addTranscript('assistant', `<b>Feedback:</b><br>${JSON.stringify(data.feedback, null, 2).slice(0, 500)}...`);
                    }
                    break;

                case 'error':
                    log('Server error: ' + data.message);
                    setStatus('disconnected', 'Error: ' + data.message);
                    break;

                default:
                    log('Event: ' + data.type);
            }
        }

        function playAudio(base64Audio) {
            if (!audioContext) { log('No audioContext!'); return; }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
                log('Resumed suspended AudioContext');
            }
            const bytes = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
            const int16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768;
            }
            playbackQueue.push(float32);
            drainQueue();
        }

        function drainQueue() {
            if (isPlaying || playbackQueue.length === 0 || !audioContext) return;
            isPlaying = true;
            const chunk = playbackQueue.shift();
            const buffer = audioContext.createBuffer(1, chunk.length, 24000);
            buffer.getChannelData(0).set(chunk);
            const src = audioContext.createBufferSource();
            src.buffer = buffer;
            src.connect(audioContext.destination);
            src.onended = () => {
                isPlaying = false;
                drainQueue();
            };
            src.start();
        }

        function disconnectSession() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'end_consultation' }));
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute').textContent = isMuted ? '🔊 Unmute' : '🔇 Mute';
            log(isMuted ? 'Muted' : 'Unmuted');
        }

        function cleanup() {
            if (workletNode) { workletNode.disconnect(); workletNode = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }
            playbackQueue = [];
            isPlaying = false;
        }
    </script>
</body>

</html>
